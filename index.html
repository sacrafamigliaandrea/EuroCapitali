<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest: Sfida delle Capitali Europee</title>
    <style>
        /* Stili Generali e Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0b192c;
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        /* Navigazione Superiore */
        #top-nav {
            background-color: #112240;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 2px solid #3a506b;
        }

        /* Layout Principale */
        #app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #main-area {
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            overflow-y: auto;
        }
        
        #sidebar {
            flex: 1;
            background-color: #112240;
            border-left: 4px solid #64ffda;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        /* Tipografia e Colori */
        h1, h2 { color: #64ffda; text-transform: uppercase; margin-bottom: 20px; text-align: center; }
        .highlight { color: #ffd700; }
        .error { color: #ff4d4d; }
        .success { color: #64ffda; }

        /* Contenitore Video Sicuro */
        #lesson-video-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            aspect-ratio: 9 / 16;
            border: 2px solid #3a506b;
            background: #000;
            margin-bottom: 15px;
            overflow: hidden;
            border-radius: 8px;
        }
        
        .video-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
            background: transparent;
            cursor: default;
        }

        #lesson-yt-player {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .custom-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        /* Area Gioco */
        #game-area {
            display: none;
            width: 100%;
            max-width: 600px;
            background-color: #1e293b;
            padding: 30px;
            border: 1px solid #64ffda;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.2);
        }

        .question-text { font-size: 1.5em; margin-bottom: 20px; }
        
        input[type="text"] {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.2em;
            padding: 10px;
            width: 80%;
            background-color: #0f172a;
            border: 1px solid #3a506b;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
            text-align: center;
        }
        input[type="text"]:focus { border-color: #64ffda; }

        .btn {
            background-color: transparent;
            color: #64ffda;
            border: 2px solid #64ffda;
            padding: 12px 24px;
            font-family: inherit;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }
        .btn:hover { background-color: rgba(100, 255, 218, 0.1); }
        .btn.active { background-color: rgba(100, 255, 218, 0.2); border-color: #ffd700; color: #ffd700; }
        .btn-small { padding: 8px 16px; font-size: 0.9em; }

        #feedback { font-size: 1.2em; margin-top: 20px; min-height: 30px; font-weight: bold; }

        /* Classifica Sidebar */
        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            background-color: #0f172a;
            margin-bottom: 8px;
            padding: 10px;
            border-left: 3px solid #3a506b;
            font-size: 0.9em;
        }
        .leaderboard-item.player { border-left-color: #ffd700; background-color: #1e293b; font-weight: bold; font-size: 1em; color: #ffd700; }
        
        /* Area Ripasso */
        #ripasso-area {
            display: none;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            width: 100%;
        }

        .card {
            background-color: #1e293b;
            border: 1px solid #3a506b;
            padding: 15px;
            border-radius: 6px;
            text-align: center;
            transition: transform 0.2s, border-color 0.2s;
        }
        .card:hover {
            transform: translateY(-3px);
            border-color: #64ffda;
        }
        .card-nazione {
            color: #8892b0;
            font-size: 0.85em;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .card-capitale {
            color: #e2e8f0;
            font-size: 1.2em;
            font-weight: bold;
        }

        /* Controlli Audio Background */
        #audio-controls {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .icon-btn {
            background: none; border: 1px solid #64ffda; color: #64ffda;
            padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div style="display:none;" id="bgm-yt-player"></div>

    <div id="audio-controls">
        <span style="font-size: 0.9em; color: #8892b0;">BGM [SOTTOFONDO]</span>
        <button class="icon-btn" id="toggle-audio">ON / OFF</button>
    </div>

    <div id="top-nav">
        <button id="nav-simulatore" class="btn active">Modulo Simulatore</button>
        <button id="nav-ripasso" class="btn">Area Ripasso</button>
    </div>

    <div id="app-container">
        <div id="main-area">
            
            <div id="sezione-gioco" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                <h1>Addestramento Operativo</h1>
                
                <div id="video-section">
                    <div id="lesson-video-container">
                        <div class="video-overlay"></div>
                        <div id="lesson-yt-player"></div>
                    </div>
                    
                    <div class="custom-controls">
                        <button id="play-lesson-btn" class="btn btn-small">PLAY VIDEO</button>
                        <button id="pause-lesson-btn" class="btn btn-small">PAUSA</button>
                    </div>
                </div>
                
                <button id="start-game-btn" class="btn" style="margin-top: 10px;">Avvia Simulazione Esame</button>

                <div id="game-area">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 20px; border-bottom: 1px solid #3a506b; padding-bottom: 10px;">
                        <span>Domanda: <span id="q-counter">1</span>/50</span>
                        <span>Punti: <span id="player-score" class="highlight">0</span></span>
                    </div>
                    
                    <div class="question-text">Qual è la capitale della <strong id="country-name" class="highlight">---</strong>?</div>
                    
                    <input type="text" id="answer-input" placeholder="Digita qui..." autocomplete="off">
                    <br>
                    <button id="submit-btn" class="btn">Invia Risposta</button>
                    
                    <div id="feedback"></div>
                </div>
            </div>

            <div id="ripasso-area">
                <h1>Database Capitali Europee</h1>
                <div class="grid-container" id="ripasso-grid">
                    </div>
            </div>

        </div>

        <div id="sidebar">
            <h2>Live Ranking</h2>
            <div id="leaderboard-container"></div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        const database = [
            { nazione: "Islanda", capitale: "Reykjavik" }, { nazione: "Danimarca", capitale: "Copenaghen" },
            { nazione: "Svezia", capitale: "Stoccolma" }, { nazione: "Finlandia", capitale: "Helsinki" },
            { nazione: "Norvegia", capitale: "Oslo" }, { nazione: "Regno Unito", capitale: "Londra" },
            { nazione: "Belgio", capitale: "Bruxelles" }, { nazione: "Paesi Bassi", capitale: "Amsterdam" },
            { nazione: "Lussemburgo", capitale: "Lussemburgo" }, { nazione: "Germania", capitale: "Berlino" },
            { nazione: "Svizzera", capitale: "Berna" }, { nazione: "Liechtenstein", capitale: "Vaduz" },
            { nazione: "Austria", capitale: "Vienna" }, { nazione: "Slovenia", capitale: "Lubiana" },
            { nazione: "Croazia", capitale: "Zagabria" }, { nazione: "Ungheria", capitale: "Budapest" },
            { nazione: "Slovacchia", capitale: "Bratislava" }, { nazione: "Repubblica Ceca", capitale: "Praga" },
            { nazione: "Polonia", capitale: "Varsavia" }, { nazione: "Lituania", capitale: "Vilnius" },
            { nazione: "Estonia", capitale: "Tallinn" }, { nazione: "Lettonia", capitale: "Riga" },
            { nazione: "Bielorussia", capitale: "Minsk" }, { nazione: "Russia", capitale: "Mosca" },
            { nazione: "Ucraina", capitale: "Kiev" }, { nazione: "Moldavia", capitale: "Chisinau" },
            { nazione: "Romania", capitale: "Bucarest" }, { nazione: "Bulgaria", capitale: "Sofia" },
            { nazione: "Georgia", capitale: "Tiblisi" }, { nazione: "Armenia", capitale: "Erevan" },
            { nazione: "Azerbaigian", capitale: "Baku" }, { nazione: "Turchia", capitale: "Ankara" },
            { nazione: "Cipro", capitale: "Nicosia" }, { nazione: "Macedonia del Nord", capitale: "Skopje" },
            { nazione: "Grecia", capitale: "Atene" }, { nazione: "Albania", capitale: "Tirana" },
            { nazione: "Serbia", capitale: "Belgrado" }, { nazione: "Kosovo", capitale: "Pristina" },
            { nazione: "Montenegro", capitale: "Podgorica" }, { nazione: "Bosnia Erzegovina", capitale: "Sarajevo" },
            { nazione: "Italia", capitale: "Roma" }, { nazione: "San Marino", capitale: "San Marino" },
            { nazione: "Vaticano", capitale: "Città del Vaticano" }, { nazione: "Malta", capitale: "La Valletta" },
            { nazione: "Spagna", capitale: "Madrid" }, { nazione: "Portogallo", capitale: "Lisbona" },
            { nazione: "Andorra", capitale: "Andorra la Vella" }, { nazione: "Principato di Monaco", capitale: "Montecarlo" },
            { nazione: "Francia", capitale: "Parigi" }, { nazione: "Irlanda", capitale: "Dublino" }
        ];

        // Creazione Bot: 1 Studente + 19 Bots = 20 Giocatori
        let players = [{ name: "TU (Studente)", score: 0, isPlayer: true }];
        const botNames = [
            "Bot_Alpha99", "GeoMaster", "SysOverride", "AtlasCore", "NavSystem",
            "EuroTracker", "MapGlitch", "CyberGeo", "QuantumPin", "VektorX",
            "TerraByte", "GridWalker", "Pulse9", "NeonCompass", "DataScout",
            "EchoLoc", "LatLongBot", "MeridianZero", "AziMuth"
        ];
        botNames.forEach(name => players.push({ name: name, score: 0, isPlayer: false }));

        let currentIndex = 0;
        let playerScore = 0;
        let shuffledData = [];
        let botInterval;

        // --- NAVIGAZIONE ---
        const btnSimulatore = document.getElementById('nav-simulatore');
        const btnRipasso = document.getElementById('nav-ripasso');
        const sezioneGioco = document.getElementById('sezione-gioco');
        const sezioneRipasso = document.getElementById('ripasso-area');

        btnSimulatore.addEventListener('click', () => {
            btnSimulatore.classList.add('active');
            btnRipasso.classList.remove('active');
            sezioneGioco.style.display = 'flex';
            sezioneRipasso.style.display = 'none';
        });

        btnRipasso.addEventListener('click', () => {
            btnRipasso.classList.add('active');
            btnSimulatore.classList.remove('active');
            sezioneRipasso.style.display = 'block';
            sezioneGioco.style.display = 'none';
        });

        // --- GENERAZIONE GRIGLIA RIPASSO ---
        const ripassoGrid = document.getElementById('ripasso-grid');
        // Ordiniamo alfabeticamente il database per il ripasso per facilitare lo studio
        const sortedDatabase = [...database].sort((a, b) => a.nazione.localeCompare(b.nazione));
        sortedDatabase.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-nazione">${item.nazione}</div>
                <div class="card-capitale">${item.capitale}</div>
            `;
            ripassoGrid.appendChild(card);
        });

        // --- GESTIONE VIDEO YOUTUBE (API) ---
        let bgmPlayer;
        let lessonPlayer;

        function onYouTubeIframeAPIReady() {
            bgmPlayer = new YT.Player('bgm-yt-player', {
                height: '0', width: '0', videoId: 'zvIbm-TvQJk',
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'zvIbm-TvQJk' }
            });

            lessonPlayer = new YT.Player('lesson-yt-player', {
                videoId: 'mtYLhvSb1v8',
                playerVars: {
                    'controls': 0, 'disablekb': 1, 'fs': 0, 'iv_load_policy': 3,
                    'modestbranding': 1, 'rel': 0, 'playsinline': 1
                }
            });
        }

        document.getElementById('play-lesson-btn').addEventListener('click', () => {
            if (lessonPlayer && typeof lessonPlayer.playVideo === 'function') lessonPlayer.playVideo();
        });
        document.getElementById('pause-lesson-btn').addEventListener('click', () => {
            if (lessonPlayer && typeof lessonPlayer.pauseVideo === 'function') lessonPlayer.pauseVideo();
        });

        document.getElementById('toggle-audio').addEventListener('click', function() {
            if (!bgmPlayer || typeof bgmPlayer.getPlayerState !== 'function') return;
            const state = bgmPlayer.getPlayerState();
            if (state === 1) {
                bgmPlayer.pauseVideo();
                this.style.borderColor = '#64ffda'; this.style.color = '#64ffda';
            } else {
                bgmPlayer.playVideo();
                this.style.borderColor = '#ff4d4d'; this.style.color = '#ff4d4d';
            }
        });

        // --- LOGICA DI GIOCO ---
        const startGameBtn = document.getElementById('start-game-btn');
        const gameArea = document.getElementById('game-area');
        const videoSection = document.getElementById('video-section');
        const countryNameEl = document.getElementById('country-name');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const feedbackEl = document.getElementById('feedback');
        const scoreEl = document.getElementById('player-score');
        const qCounterEl = document.getElementById('q-counter');
        const leaderboardContainer = document.getElementById('leaderboard-container');

        function shuffleArray(array) {
            let curId = array.length;
            while (0 !== curId) {
                let randId = Math.floor(Math.random() * curId);
                curId -= 1;
                let tmp = array[curId]; array[curId] = array[randId]; array[randId] = tmp;
            }
            return array;
        }

        startGameBtn.addEventListener('click', () => {
            if (lessonPlayer && typeof lessonPlayer.pauseVideo === 'function') lessonPlayer.pauseVideo();
            
            shuffledData = shuffleArray([...database]);
            currentIndex = 0; playerScore = 0;
            players.forEach(p => p.score = 0);
            
            startGameBtn.style.display = 'none';
            videoSection.style.display = 'none';
            gameArea.style.display = 'block';
            
            if(botInterval) clearInterval(botInterval);
            // I bot si aggiornano più rapidamente ora per dare sensazione di frenesia (ogni 2.5 secondi)
            botInterval = setInterval(updateBots, 2500);
            
            loadQuestion();
            renderLeaderboard();
        });

        function loadQuestion() {
            if (currentIndex >= shuffledData.length) {
                clearInterval(botInterval);
                gameArea.innerHTML = `<h2>Simulazione Completata!</h2><p>Punteggio Finale: <span class="highlight">${playerScore}</span></p>`;
                return;
            }
            const currentItem = shuffledData[currentIndex];
            countryNameEl.textContent = currentItem.nazione;
            answerInput.value = ''; answerInput.focus();
            qCounterEl.textContent = currentIndex + 1;
        }

        submitBtn.addEventListener('click', checkAnswer);
        answerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') checkAnswer(); });

        function checkAnswer() {
            if(answerInput.value.trim() === '') return;
            
            const userAnswer = answerInput.value.trim();
            const correctAnswer = shuffledData[currentIndex].capitale;

            if (userAnswer === correctAnswer) {
                playerScore += 10;
                feedbackEl.textContent = "CORRETTO! +10 Punti";
                feedbackEl.className = "success";
            } else {
                playerScore -= 10;
                feedbackEl.innerHTML = `ERRORE. Sintassi corretta: <span class="highlight">${correctAnswer}</span>. Penalità: -10 Pts.`;
                feedbackEl.className = "error";
            }

            players.find(p => p.isPlayer).score = playerScore;
            scoreEl.textContent = playerScore;
            renderLeaderboard();

            currentIndex++;
            answerInput.disabled = true; submitBtn.disabled = true;
            
            setTimeout(() => {
                feedbackEl.textContent = '';
                answerInput.disabled = false; submitBtn.disabled = false;
                loadQuestion();
            }, 2500);
        }

        function updateBots() {
            players.forEach(player => {
                if (!player.isPlayer) {
                    const rand = Math.random();
                    // Leggera diversificazione del comportamento dei bot per renderlo più realistico
                    if (rand > 0.45) player.score += 10;
                    else if (rand < 0.15) player.score -= 10;
                }
            });
            renderLeaderboard();
        }

        function renderLeaderboard() {
            players.sort((a, b) => b.score - a.score);
            leaderboardContainer.innerHTML = '';
            players.forEach((player, index) => {
                const div = document.createElement('div');
                div.className = `leaderboard-item ${player.isPlayer ? 'player' : ''}`;
                div.innerHTML = `<span>${index + 1}. ${player.name}</span><span>${player.score} PTS</span>`;
                leaderboardContainer.appendChild(div);
            });
        }

        renderLeaderboard();
    </script>
</body>
</html>
