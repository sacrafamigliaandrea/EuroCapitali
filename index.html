<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoQuest: Sfida delle Capitali Europee</title>
    <style>
        /* Stili Generali e Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0b192c;
            color: #e2e8f0;
            display: flex;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
        }

        /* Navigazione Superiore */
        #top-nav {
            background-color: #112240;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            border-bottom: 2px solid #3a506b;
            position: relative;
        }

        /* Layout Principale */
        #app-container { display: flex; flex: 1; overflow: hidden; }
        #main-area { flex: 3; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        #sidebar { flex: 1; background-color: #112240; border-left: 4px solid #64ffda; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }

        /* Tipografia e Colori */
        h1, h2 { color: #64ffda; text-transform: uppercase; margin-bottom: 15px; text-align: center; }
        .highlight { color: #ffd700; }
        .error { color: #ff4d4d; }
        .success { color: #64ffda; }

        /* Bottoni */
        .btn {
            background-color: transparent; color: #64ffda; border: 2px solid #64ffda;
            padding: 10px 20px; font-family: inherit; font-size: 1em; font-weight: bold;
            cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .btn:hover:not(:disabled) { background-color: rgba(100, 255, 218, 0.1); }
        .btn.active { background-color: rgba(100, 255, 218, 0.2); border-color: #ffd700; color: #ffd700; }
        .btn:disabled { border-color: #555; color: #555; cursor: not-allowed; }

        /* --- FASE DI STUDIO (Layout Side-by-Side) --- */
        #studio-area { display: flex; width: 100%; max-width: 1400px; gap: 30px; justify-content: center; align-items: flex-start; }
        #video-side { flex: 1; max-width: 350px; display: flex; flex-direction: column; align-items: center; }
        #grid-side { flex: 2; height: 75vh; overflow-y: auto; padding-right: 10px; }
        
        #lesson-video-container {
            position: relative; width: 100%; aspect-ratio: 9 / 16;
            border: 2px solid #3a506b; background: #000; margin-bottom: 15px;
            overflow: hidden; border-radius: 8px; box-shadow: 0 0 20px rgba(100, 255, 218, 0.1);
        }
        .video-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 10; cursor: default; }
        #lesson-yt-player { width: 100%; height: 100%; pointer-events: none; }
        
        /* Griglia Studio e Ripasso */
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; width: 100%; }
        .card {
            background-color: #1e293b; border: 1px solid #3a506b; padding: 12px;
            border-radius: 6px; text-align: center; transition: all 0.2s;
        }
        .card-nazione { color: #8892b0; font-size: 0.8em; text-transform: uppercase; margin-bottom: 5px; }
        .card-capitale { color: #e2e8f0; font-size: 1.1em; font-weight: bold; }
        
        /* Effetto pulsazione video sync */
        .card.active-pulse {
            border-color: #ffd700; background-color: rgba(255, 215, 0, 0.2);
            transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        /* --- FASE GIOCO --- */
        #game-area {
            display: none; width: 100%; max-width: 600px; background-color: #1e293b;
            padding: 30px; border: 1px solid #64ffda; border-radius: 8px; text-align: center;
            box-shadow: 0 0 15px rgba(100, 255, 218, 0.2); position: relative;
        }

        /* Animazione Errore (Shake) */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .shake-effect { animation: shake 0.5s; animation-iteration-count: 1; border-color: #ff4d4d !important; }

        /* HUD Gioco */
        .game-hud { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid #3a506b; padding-bottom: 10px; font-weight: bold; }
        #timer-container { width: 100%; height: 10px; background-color: #0f172a; border-radius: 5px; margin-bottom: 20px; overflow: hidden; }
        #timer-bar { height: 100%; width: 100%; background-color: #64ffda; transition: width 0.1s linear, background-color 0.3s; }
        #combo-text { font-size: 1.2em; color: #ffd700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        
        .question-text { font-size: 1.5em; margin-bottom: 20px; }
        input[type="text"] {
            font-family: 'Courier New', Courier, monospace; font-size: 1.4em; padding: 12px; width: 80%;
            background-color: #0f172a; border: 2px solid #3a506b; color: #fff; margin-bottom: 20px; text-align: center; outline: none; transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: #64ffda; }
        input[type="text"].fire-mode { border-color: #ff8c00; box-shadow: 0 0 10px rgba(255, 140, 0, 0.5); }

        /* Power Ups */
        .power-ups { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .power-btn { background-color: #112240; border: 1px solid #8892b0; color: #8892b0; padding: 8px; font-size: 0.8em; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .power-btn:hover:not(:disabled) { border-color: #64ffda; color: #64ffda; }
        .power-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Classifica Sidebar */
        .leaderboard-item { display: flex; justify-content: space-between; background-color: #0f172a; margin-bottom: 8px; padding: 10px; border-left: 3px solid #3a506b; font-size: 0.9em; }
        .leaderboard-item.player { border-left-color: #ffd700; background-color: #1e293b; font-weight: bold; font-size: 1em; color: #ffd700; }

        /* BGM Controls */
        #audio-controls { position: absolute; top: 15px; left: 20px; display: flex; align-items: center; gap: 10px; }
        .icon-btn { background: none; border: 1px solid #64ffda; color: #64ffda; padding: 5px 10px; cursor: pointer; font-family: inherit; font-size: 0.9em; }
    </style>
</head>
<body>

    <div style="display:none;" id="bgm-yt-player"></div>

    <div id="top-nav">
        <div id="audio-controls">
            <span style="font-size: 0.9em; color: #8892b0;">BGM [AUDIO]</span>
            <button class="icon-btn" id="toggle-audio">OFF</button>
        </div>
        <button id="nav-studio" class="btn active">Fase di Studio</button>
        <button id="nav-game" class="btn">Simulatore Operativo</button>
        <button id="nav-review" class="btn">Database Completo</button>
    </div>

    <div id="app-container">
        <div id="main-area">

            <div id="studio-view" style="width: 100%;">
                <h1>Addestramento: Mappatura Target</h1>
                <div id="studio-area">
                    <div id="video-side">
                        <div id="lesson-video-container">
                            <div class="video-overlay"></div>
                            <div id="lesson-yt-player"></div>
                        </div>
                        <div style="display: flex; gap: 10px;">
                            <button id="play-lesson-btn" class="btn">PLAY</button>
                            <button id="pause-lesson-btn" class="btn">PAUSA</button>
                        </div>
                    </div>
                    <div id="grid-side">
                        <div class="grid-container" id="sync-grid"></div>
                    </div>
                </div>
            </div>

            <div id="game-view" style="display: none; width: 100%; justify-content: center;">
                <div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
                    <h1 id="pre-game-title">Pronto all'azione?</h1>
                    <button id="start-game-btn" class="btn" style="margin-bottom: 20px;">INIZIA MISSIONE</button>
                    
                    <div id="game-area">
                        <div id="timer-container"><div id="timer-bar"></div></div>
                        
                        <div class="game-hud">
                            <span>Q: <span id="q-counter">1</span>/50</span>
                            <span id="combo-text">Combo: x1</span>
                            <span>Score: <span id="player-score" class="highlight">0</span></span>
                        </div>
                        
                        <div class="question-text">Target: <strong id="country-name" class="highlight">---</strong></div>
                        
                        <input type="text" id="answer-input" placeholder="Digita capitale..." autocomplete="off">
                        <br>
                        <button id="submit-btn" class="btn">INVIA DATI</button>
                        
                        <div class="power-ups">
                            <button class="power-btn" id="pu-scudo">Scudo Bot (10s)</button>
                            <button class="power-btn" id="pu-radar">Radar Lettere</button>
                            <button class="power-btn" id="pu-salto">Salto Quantico</button>
                        </div>
                        
                        <div id="feedback" style="margin-top: 15px; font-weight: bold; min-height: 25px;"></div>
                    </div>
                </div>
            </div>

            <div id="review-view" style="display: none; width: 100%;">
                <h1>Database Ordinato</h1>
                <div class="grid-container" id="static-grid" style="max-width: 1000px; margin: 0 auto;"></div>
            </div>

        </div>

        <div id="sidebar">
            <h2>Classifica Globale</h2>
            <div id="leaderboard-container"></div>
        </div>
    </div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // Database sincronizzato in base al file SRT
        const database = [
            { nazione: "Islanda", capitale: "Reykjavik", time: 0.000 },
            { nazione: "Danimarca", capitale: "Copenaghen", time: 2.511 },
            { nazione: "Svezia", capitale: "Stoccolma", time: 5.022 },
            { nazione: "Finlandia", capitale: "Helsinki", time: 7.533 },
            { nazione: "Norvegia", capitale: "Oslo", time: 10.044 },
            { nazione: "Regno Unito", capitale: "Londra", time: 12.556 },
            { nazione: "Belgio", capitale: "Bruxelles", time: 15.067 },
            { nazione: "Paesi Bassi", capitale: "Amsterdam", time: 17.578 },
            { nazione: "Lussemburgo", capitale: "Lussemburgo", time: 20.089 },
            { nazione: "Germania", capitale: "Berlino", time: 22.600 },
            { nazione: "Svizzera", capitale: "Berna", time: 25.112 },
            { nazione: "Liechtenstein", capitale: "Vaduz", time: 27.623 },
            { nazione: "Austria", capitale: "Vienna", time: 30.134 },
            { nazione: "Slovenia", capitale: "Lubiana", time: 32.645 },
            { nazione: "Croazia", capitale: "Zagabria", time: 35.156 },
            { nazione: "Ungheria", capitale: "Budapest", time: 37.667 },
            { nazione: "Slovacchia", capitale: "Bratislava", time: 40.179 },
            { nazione: "Repubblica Ceca", capitale: "Praga", time: 42.690 },
            { nazione: "Polonia", capitale: "Varsavia", time: 45.201 },
            { nazione: "Lituania", capitale: "Vilnius", time: 47.712 },
            { nazione: "Estonia", capitale: "Tallin", time: 50.224 },
            { nazione: "Lettonia", capitale: "Riga", time: 52.735 },
            { nazione: "Bielorussia", capitale: "Minsk", time: 55.246 },
            { nazione: "Russia", capitale: "Mosca", time: 57.757 },
            { nazione: "Ucraina", capitale: "Kiev", time: 60.268 },
            { nazione: "Moldavia", capitale: "Chisinau", time: 62.780 },
            { nazione: "Romania", capitale: "Bucarest", time: 65.291 },
            { nazione: "Bulgaria", capitale: "Sofia", time: 67.802 },
            { nazione: "Georgia", capitale: "Tiblisi", time: 70.313 },
            { nazione: "Armenia", capitale: "Erevan", time: 72.824 },
            { nazione: "Azerbaigian", capitale: "Baku", time: 75.335 },
            { nazione: "Turchia", capitale: "Ankara", time: 77.847 },
            { nazione: "Cipro", capitale: "Nicosia", time: 80.358 },
            { nazione: "Macedonia del Nord", capitale: "Skopje", time: 82.869 },
            { nazione: "Grecia", capitale: "Atene", time: 85.380 },
            { nazione: "Albania", capitale: "Tirana", time: 87.892 },
            { nazione: "Serbia", capitale: "Belgrado", time: 90.403 },
            { nazione: "Kosovo", capitale: "Pristina", time: 92.914 },
            { nazione: "Montenegro", capitale: "Podgorica", time: 95.425 },
            { nazione: "Bosnia Erzegovina", capitale: "Sarajevo", time: 97.936 },
            { nazione: "Italia", capitale: "Roma", time: 100.448 },
            { nazione: "San Marino", capitale: "San Marino", time: 102.959 },
            { nazione: "Vaticano", capitale: "Città del Vaticano", time: 105.470 },
            { nazione: "Malta", capitale: "La Valletta", time: 107.981 },
            { nazione: "Spagna", capitale: "Madrid", time: 110.492 },
            { nazione: "Portogallo", capitale: "Lisbona", time: 113.004 },
            { nazione: "Andorra", capitale: "Andorra La Vella", time: 115.515 },
            { nazione: "Principato di Monaco", capitale: "Montecarlo", time: 118.026 },
            { nazione: "Francia", capitale: "Parigi", time: 120.537 },
            { nazione: "Irlanda", capitale: "Dublino", time: 123.048 }
        ];

        // Generazione Griglie
        const syncGrid = document.getElementById('sync-grid');
        const staticGrid = document.getElementById('static-grid');
        
        // Griglia Sincronizzata (Ordine del video)
        database.forEach((item, i) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.id = 'sync-card-' + i;
            card.innerHTML = `<div class="card-nazione">${item.nazione}</div><div class="card-capitale">${item.capitale}</div>`;
            syncGrid.appendChild(card);
        });

        // Griglia Ripasso (Ordine Alfabetico)
        [...database].sort((a,b) => a.nazione.localeCompare(b.nazione)).forEach((item) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<div class="card-nazione">${item.nazione}</div><div class="card-capitale">${item.capitale}</div>`;
            staticGrid.appendChild(card);
        });

        // Navigazione
        const views = {
            studio: document.getElementById('studio-view'),
            game: document.getElementById('game-view'),
            review: document.getElementById('review-view')
        };
        const navBtns = {
            studio: document.getElementById('nav-studio'),
            game: document.getElementById('nav-game'),
            review: document.getElementById('nav-review')
        };

        function switchView(viewName) {
            Object.values(views).forEach(v => v.style.display = 'none');
            Object.values(navBtns).forEach(b => b.classList.remove('active'));
            views[viewName].style.display = 'flex';
            navBtns[viewName].classList.add('active');
            
            // Pausa video se si esce dalla pagina Studio
            if(viewName !== 'studio' && lessonPlayer && typeof lessonPlayer.pauseVideo === 'function') {
                lessonPlayer.pauseVideo();
            }
        }
        navBtns.studio.addEventListener('click', () => switchView('studio'));
        navBtns.game.addEventListener('click', () => switchView('game'));
        navBtns.review.addEventListener('click', () => switchView('review'));

        // Gestione Giocatori e Bot
        let players = [{ name: "TU (Studente)", score: 0, isPlayer: true }];
        const botNames = ["Bot_Alpha", "GeoMaster", "SysOver", "AtlasX", "NavBot", "EuroTrack", "Glitch", "Cyber", "Quantum", "Vektor", "Byte", "Grid", "Pulse", "Neon", "Scout", "Echo", "LatLong", "Zero", "Muth"];
        botNames.forEach(name => players.push({ name, score: 0, isPlayer: false }));

        // Variabili di Gioco
        let currentIndex = 0;
        let playerScore = 0;
        let combo = 0;
        let shuffledData = [];
        let botInterval, timerInterval, syncInterval;
        let timeLeft = 15;
        let isScudoActive = false;

        // Elementi DOM Gioco
        const startGameBtn = document.getElementById('start-game-btn');
        const gameArea = document.getElementById('game-area');
        const countryNameEl = document.getElementById('country-name');
        const answerInput = document.getElementById('answer-input');
        const submitBtn = document.getElementById('submit-btn');
        const feedbackEl = document.getElementById('feedback');
        const timerBar = document.getElementById('timer-bar');
        const comboText = document.getElementById('combo-text');
        
        // --- YOUTUBE API & SYNC ---
        let bgmPlayer, lessonPlayer;
        function onYouTubeIframeAPIReady() {
            // Musica di Sottofondo
            bgmPlayer = new YT.Player('bgm-yt-player', { 
                height: '0', width: '0', videoId: 'zvIbm-TvQJk', 
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1, 'playlist': 'zvIbm-TvQJk' } 
            });
            
            // Video Lezione
            lessonPlayer = new YT.Player('lesson-yt-player', {
                videoId: 'mtYLhvSb1v8',
                playerVars: { 'controls': 0, 'disablekb': 1, 'fs': 0, 'iv_load_policy': 3, 'modestbranding': 1, 'rel': 0, 'playsinline': 1 }
            });

            // Avvio Sincronizzatore Video-Griglia
            syncInterval = setInterval(() => {
                if (lessonPlayer && lessonPlayer.getPlayerState && lessonPlayer.getPlayerState() === 1) { 
                    let time = lessonPlayer.getCurrentTime();
                    let activeIndex = -1;
                    
                    // Trova l'ultima nazione il cui tempo è stato superato dal video
                    for(let i=0; i<database.length; i++) {
                        if(time >= database[i].time) activeIndex = i;
                    }
                    
                    if(activeIndex >= 0) {
                        // Rimuovi l'evidenziatore dalle altre card
                        document.querySelectorAll('#sync-grid .card').forEach(c => c.classList.remove('active-pulse'));
                        let activeCard = document.getElementById('sync-card-' + activeIndex);
                        
                        if(activeCard && !activeCard.classList.contains('active-pulse')) {
                            activeCard.classList.add('active-pulse');
                            // Scrolla la griglia automaticamente
                            activeCard.scrollIntoView({ behavior: "smooth", block: "center" });
                        }
                    }
                }
            }, 100); // Check ultrarapido per la massima reattività
        }

        // Controlli Media
        document.getElementById('play-lesson-btn').addEventListener('click', () => lessonPlayer.playVideo());
        document.getElementById('pause-lesson-btn').addEventListener('click', () => lessonPlayer.pauseVideo());
        document.getElementById('toggle-audio').addEventListener('click', function() {
            if (bgmPlayer.getPlayerState() === 1) {
                bgmPlayer.pauseVideo(); this.style.borderColor = '#64ffda'; this.style.color = '#64ffda'; this.textContent = "OFF";
            } else {
                bgmPlayer.playVideo(); this.style.borderColor = '#ff4d4d'; this.style.color = '#ff4d4d'; this.textContent = "ON";
            }
        });

        // --- LOGICA GAMIFICATION ---
        startGameBtn.addEventListener('click', () => {
            startGameBtn.style.display = 'none';
            document.getElementById('pre-game-title').style.display = 'none';
            gameArea.style.display = 'block';
            
            // Mescola il database per la partita
            shuffledData = [...database].sort(() => Math.random() - 0.5);
            currentIndex = 0; playerScore = 0; combo = 0;
            players.forEach(p => p.score = 0);
            
            // Ripristina Power-ups
            document.querySelectorAll('.power-btn').forEach(btn => btn.disabled = false);
            isScudoActive = false;

            if(botInterval) clearInterval(botInterval);
            botInterval = setInterval(updateBots, 2000); // Frequenza di punteggio dei bot

            loadQuestion();
            renderLeaderboard();
        });

        function loadQuestion() {
            if (currentIndex >= shuffledData.length) return endGame();
            
            countryNameEl.textContent = shuffledData[currentIndex].nazione;
            answerInput.value = ''; 
            answerInput.disabled = false; submitBtn.disabled = false;
            answerInput.focus();
            document.getElementById('q-counter').textContent = currentIndex + 1;
            
            // Start Timer (15 secondi)
            timeLeft = 15;
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#64ffda';
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                let pct = (timeLeft / 15) * 100;
                timerBar.style.width = Math.max(0, pct) + '%';
                
                if(pct < 30) timerBar.style.backgroundColor = '#ff4d4d'; // Barra rossa in esaurimento
                
                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    processAnswer(false, true); // Chiamata per timeout
                }
            }, 100);
        }

        submitBtn.addEventListener('click', () => processAnswer());
        answerInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') processAnswer(); });

        function processAnswer(userInitiated = true, timeout = false) {
            if(userInitiated && answerInput.value.trim() === '') return;
            clearInterval(timerInterval);
            
            const userAnswer = answerInput.value.trim();
            const correctAnswer = shuffledData[currentIndex].capitale;
            let isCorrect = userAnswer === correctAnswer && !timeout;

            answerInput.disabled = true; submitBtn.disabled = true;

            if (isCorrect) {
                combo++;
                let multiplier = Math.min(combo, 5); // Limite Combo a x5
                let earned = 10 * multiplier;
                playerScore += earned;
                
                feedbackEl.textContent = `ESATTO! +${earned} Pts`;
                feedbackEl.className = "success";
                
                if(combo >= 3) {
                    answerInput.classList.add('fire-mode');
                    comboText.textContent = `Combo Fuoco: x${multiplier}!`;
                } else {
                    comboText.textContent = `Combo: x${multiplier}`;
                }
            } else {
                combo = 0;
                playerScore -= 10;
                answerInput.classList.remove('fire-mode');
                comboText.textContent = `Combo: x1`;
                
                let reason = timeout ? "TEMPO SCADUTO." : "ERRORE.";
                feedbackEl.innerHTML = `${reason} Corretta: <span class="highlight">${correctAnswer}</span>. -10 Pts.`;
                feedbackEl.className = "error";
                
                // Effetto vibrazione per l'errore
                gameArea.classList.add('shake-effect');
                setTimeout(() => gameArea.classList.remove('shake-effect'), 500);
            }

            players.find(p => p.isPlayer).score = playerScore;
            document.getElementById('player-score').textContent = playerScore;
            renderLeaderboard();

            currentIndex++;
            setTimeout(() => {
                feedbackEl.textContent = '';
                loadQuestion();
            }, 2000);
        }

        // --- POWER UPS ---
        document.getElementById('pu-scudo').addEventListener('click', function() {
            this.disabled = true; 
            isScudoActive = true;
            this.textContent = "ATTIVO..."; this.style.borderColor = "#ffd700"; this.style.color = "#ffd700";
            
            setTimeout(() => { 
                isScudoActive = false; 
                this.textContent = "SCUDO ESAURITO"; 
                this.style.borderColor = "#555"; 
                this.style.color = "#555"; 
            }, 10000); // Lo scudo dura 10 secondi
        });

        document.getElementById('pu-radar').addEventListener('click', function() {
            this.disabled = true;
            let cap = shuffledData[currentIndex].capitale;
            // Mostra la prima e l'ultima lettera, nasconde il centro con dei puntini
            answerInput.value = cap.charAt(0) + ".".repeat(cap.length - 2) + cap.charAt(cap.length - 1);
            answerInput.focus();
        });

        document.getElementById('pu-salto').addEventListener('click', function() {
            this.disabled = true;
            clearInterval(timerInterval);
            feedbackEl.textContent = "Salto Quantico eseguito. Nessun punto.";
            feedbackEl.className = "highlight";
            currentIndex++;
            setTimeout(() => { feedbackEl.textContent = ''; loadQuestion(); }, 1500);
        });

        // --- BOT E LEADERBOARD ---
        function updateBots() {
            if (isScudoActive) return; // Se lo scudo è attivo, i bot sono congelati
            
            players.forEach(player => {
                if (!player.isPlayer) {
                    const rand = Math.random();
                    if (rand > 0.45) player.score += 10;
                    else if (rand < 0.15) player.score -= 10;
                }
            });
            renderLeaderboard();
        }

        function renderLeaderboard() {
            players.sort((a, b) => b.score - a.score);
            let lc = document.getElementById('leaderboard-container');
            lc.innerHTML = '';
            
            players.forEach((player, index) => {
                const div = document.createElement('div');
                div.className = `leaderboard-item ${player.isPlayer ? 'player' : ''}`;
                div.innerHTML = `<span>${index + 1}. ${player.name}</span><span>${player.score}</span>`;
                lc.appendChild(div);
            });
        }

        function endGame() {
            clearInterval(botInterval);
            
            let rank = "Turista Smarrito";
            if(playerScore > 200) rank = "Esploratore";
            if(playerScore > 400) rank = "Agente Operativo";
            if(playerScore > 600) rank = "Sovrano della Geografia";

            gameArea.innerHTML = `
                <h2>SIMULAZIONE TERMINATA</h2>
                <p style="font-size: 1.5em; margin: 20px 0;">Punti totali: <span class="highlight">${playerScore}</span></p>
                <p style="font-size: 1.2em;">Grado Assegnato:</p>
                <h1 style="color: #ffd700;">${rank}</h1>
                <button class="btn" onclick="location.reload()" style="margin-top:20px;">Riavvia Sistema</button>
            `;
        }

        renderLeaderboard();
    </script>
</body>
</html>
